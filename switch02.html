<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Switch문 02</title>
  </head>
  <body>
    <script>
      let site = prompt(
        "네이버, 구글, 유튜브 / 즐겨 사용하는 포털 검색 사이트는?",
      );
      let url; //변수 선언만

      switch (site) {
        case "네이버":
          url = "www.naver.com";
          break;
        case "구글":
          url = "www.google.com";
          break;
        case "유튜브":
          url = "www.youtube.com";
          break;
        default:
          alert("보기에 없는 사이트입니다.");
      }
      //   console.log(url);

      // 사이트로 이동
      if (url) {
        window.open(`https://${url}` , "_self");
      }
    </script>
  </body>
</html>
