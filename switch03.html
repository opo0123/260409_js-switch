<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Switch문 03</title>
    <style>
        body {
            background-color: rgb(18, 101, 173);
            color: #fff;
            font-size: 24px;
        }
        p {
            margin: 150px;
            text-align: center;
        }
        p strong {
            font-size: 28px;
        }
    </style>
  </head>
  <body>
    <script>
      let session = prompt(
        "관심 세션을 선택해주세요. 1-마케팅,2-개발,3-디자인", "숫자만 입력해주세요."
      );

      switch(session){
        case "1" : document.write(`<p>마케팅 세션은 <strong>101호</strong>에서 진행합니다.</p>`)
      }
      switch(session){
        case "2" : document.write(`<p>개발 세션은 <strong>202호</strong>에서 진행합니다.</p>`)
      }
      switch(session){
        case "3" : document.write(`<p>디자인 세션은 <strong>303호</strong>에서 진행합니다.</p>`)
      }
    </script>
  </body>
</html>
